name:  Ci CD piplelne
on:
  push:
    branches:
      - main
jobs:
  docker:
    runs-on: ubuntu-latest

    steps: 
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}} 
          password:  ${{secrets.DOCKER_PASSWORD}} 
     
      - name: docker build
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/resume-analyser .

      - name: docker push
        run: docker push ${{secrets.DOCKER_USERNAME}}/resume-analyser:latest   
