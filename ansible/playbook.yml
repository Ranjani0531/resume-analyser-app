
---
- hosts: web
  become: true

  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Install Python
      apt:
        name: python3
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes        